    <style>
        :root{ --accent:#94145a; }
        *,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
        html,body{ height:100%; }
        body{ font-family:var(--sans); background:var(--warm-white); color:var(--mid); -webkit-font-smoothing:antialiased; overflow:hidden; }

        /* La página del mapa no hace scroll, así que fijamos el header en su estado "sólido" para que se vea terminado y no flote transparente sobre el contenido. */
        nav#nav{ background:rgba(245,243,239,.96); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); box-shadow:0 1px 0 var(--smoke); height:74px; }

        .map-wrapper{ margin-top:74px; height:calc(100vh - 74px); display:flex; overflow:hidden; }

        /* Sidebar */
        .map-sidebar{ width:312px; flex-shrink:0; background:var(--warm-white); border-right:1px solid var(--smoke); display:flex; flex-direction:column; overflow:hidden; }
        .sidebar-head{ padding:30px 28px 24px; background:var(--ink); color:var(--warm-white); }
        .sidebar-head h1{ font-family:var(--serif); font-size:40px; font-style:italic; font-weight:300; line-height:1; color:var(--warm-white); }
        .sidebar-head p{ font-size:13px; font-weight:300; color:rgba(255,255,255,.6); margin-top:8px; letter-spacing:.04em; }

        .floor-tabs{ display:flex; flex-wrap:wrap; background:var(--mid); }
        .floor-tab{ flex:1 1 50%; font-family:var(--sans); font-size:11.5px; font-weight:400; letter-spacing:.16em; text-transform:uppercase; color:rgba(255,255,255,.55); background:transparent; border:none; cursor:pointer; padding:14px 6px; transition:color .25s, background .25s; }
        .floor-tab:hover{ color:var(--warm-white); }
        .floor-tab.active{ color:var(--warm-white); background:rgba(255,255,255,.08); }

        /* Filtro por categoría con botones */
        .cat-filters{ display:flex; flex-wrap:wrap; gap:7px; padding:14px 16px 4px; }
        .cat-fbtn{ font-family:var(--sans); font-size:11px; font-weight:500; letter-spacing:.08em; text-transform:uppercase; color:var(--mid); background:var(--smoke); border:1px solid transparent; padding:8px 13px; cursor:pointer; transition:background .2s, color .2s, border-color .2s; }
        .cat-fbtn:hover{ border-color:var(--silver); }
        .cat-fbtn.active{ background:var(--ink); color:var(--warm-white); border-color:var(--ink); }

        .sidebar-filters{ padding:10px 16px 14px; border-bottom:1px solid var(--smoke); display:flex; flex-direction:column; gap:10px; }
        .sidebar-filters select, .sidebar-search input{ width:100%; font-family:var(--sans); font-size:13px; color:var(--mid); background:var(--smoke); border:none; padding:13px 16px; outline:none; }
        .sidebar-filters select{ letter-spacing:.1em; text-transform:uppercase; cursor:pointer; -webkit-appearance:none; appearance:none; }
        .sidebar-search{ position:relative; }
        .sidebar-search input{ padding-left:38px; }
        .sidebar-search svg{ position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--grey); }

        .store-list{ flex:1; overflow-y:auto; padding:4px 0 20px; }
        .store-list::-webkit-scrollbar{ width:4px; } .store-list::-webkit-scrollbar-thumb{ background:var(--silver); }
        .sl-group-label{ font-family:var(--sans); font-size:10px; font-weight:600; letter-spacing:.26em; text-transform:uppercase; color:var(--grey); padding:18px 24px 8px; }
        .store-item{ display:flex; align-items:center; gap:14px; padding:12px 24px; cursor:pointer; border-bottom:1px solid var(--smoke); background:transparent; transition:background .2s, padding-left .2s; position:relative; }
        .store-item::before{ content:''; position:absolute; left:0; top:0; bottom:0; width:0; background:var(--grey); transition:width .2s; }
        .store-item:hover, .store-item.active{ background:rgba(133,127,120,.10); padding-left:30px; }
        .store-item:hover::before, .store-item.active::before{ width:4px; }
        .store-num{ font-family:var(--serif); font-style:italic; font-size:15px; color:var(--grey); min-width:26px; }
        .store-item.unassigned .store-num{ color:var(--silver); }
        .store-name{ font-family:var(--serif); font-size:17px; font-weight:300; color:var(--ink); line-height:1.15; }
        .store-cat{ font-family:var(--sans); font-size:11px; font-weight:400; letter-spacing:.12em; text-transform:uppercase; color:var(--grey); margin-top:2px; }
        .store-item.unassigned .store-name{ color:var(--grey); font-style:italic; }

        /* Canvas */
        .map-canvas{ flex:1; position:relative; background:#fbfaf8; overflow:hidden; }
        #map-stage{ position:absolute; inset:0; overflow:hidden; cursor:grab; touch-action:none; }
        #map-stage.grabbing{ cursor:grabbing; }
        #map-pan{ position:absolute; inset:0; transform-origin:0 0; will-change:transform; }
        .floor-svg{ position:absolute; inset:24px; display:none; }
        .floor-svg.active{ display:block; }
        .floor-svg svg{ width:100%; height:100%; display:block; }

        /* Interactive zones — high specificity beats inline #floor-x .cls-1 */
        #map-pan svg .store-zone{ fill:var(--silver); fill-opacity:0; stroke:#010101; pointer-events:all; cursor:pointer; transition:fill-opacity .15s ease, stroke .15s ease; }
        #map-pan svg .store-zone.cat-dim{ fill-opacity:0; }
        #map-pan svg .store-zone.cat-on{ fill:var(--zc,var(--grey)); fill-opacity:.22; }
        #map-pan svg .store-zone:hover{ fill:var(--silver); fill-opacity:.55; }
        #map-pan svg .store-zone.is-active{ fill:var(--grey); fill-opacity:.4; stroke:var(--ink); stroke-width:3px; }
        /* ocultar los rótulos de nivel/sección impresos en el plano (PLANTA BAJA, PRIMER NIVEL, etc.) */
        #floor-planta_baja .cls-8, #floor-primer .cls-7, #floor-segundo .cls-8, #floor-city_market .cls-2{ display:none !important; }

        /* Zoom controls */
        .zoom-ctrl{ position:absolute; top:20px; right:20px; display:flex; flex-direction:column; background:var(--warm-white); box-shadow:0 4px 24px rgba(0,0,0,.08); border:1px solid var(--smoke); z-index:20; }
        .zoom-ctrl button{ width:42px; height:42px; border:none; background:transparent; color:var(--ink); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .2s; }
        .zoom-ctrl button:not(:last-child){ border-bottom:1px solid var(--smoke); }
        .zoom-ctrl button:hover{ background:var(--smoke); }

        /* Tooltip */
        #map-tip{ position:fixed; z-index:60; pointer-events:none; background:var(--ink); color:var(--warm-white); font-family:var(--sans); font-size:12.5px; font-weight:300; letter-spacing:.02em; padding:8px 13px; border-radius:3px; opacity:0; transform:translate(-50%,-130%); transition:opacity .12s; white-space:nowrap; box-shadow:0 8px 24px rgba(0,0,0,.25); }
        #map-tip.show{ opacity:1; }
        #map-tip b{ font-weight:500; }
        #map-tip .tip-num{ font-family:var(--serif); font-style:italic; color:rgba(255,255,255,.6); margin-right:6px; }

        /* Info panel */
        .map-info{ position:absolute; bottom:24px; left:24px; width:300px; background:var(--warm-white); border:1px solid var(--smoke); box-shadow:0 12px 40px rgba(0,0,0,.12); padding:24px; opacity:0; pointer-events:none; transform:translateY(16px); transition:opacity .3s, transform .3s; z-index:25; }
        .map-info.show{ opacity:1; pointer-events:all; transform:none; }
        .map-info .pi-close{ position:absolute; top:14px; right:14px; background:none; border:none; color:var(--grey); cursor:pointer; font-size:15px; }
        .map-info .pi-close:hover{ color:var(--ink); }
        .pi-img{ width:100%; height:150px; object-fit:cover; display:block; margin:-24px -24px 16px; width:calc(100% + 48px); background:var(--smoke); }
        .pi-local{ font-family:var(--serif); font-style:italic; font-size:14px; color:var(--grey); }
        .pi-cat{ font-family:var(--sans); font-size:11px; font-weight:500; letter-spacing:.22em; text-transform:uppercase; color:var(--grey); margin-top:8px; display:block; }
        .pi-name{ font-family:var(--serif); font-size:27px; font-style:italic; font-weight:300; color:var(--ink); line-height:1.05; margin:4px 0 6px; }
        .pi-meta{ font-family:var(--sans); font-size:13px; font-weight:300; color:var(--grey); line-height:1.6; }
        .pi-btn{ margin-top:16px; display:inline-flex; align-items:center; gap:8px; font-family:var(--sans); font-size:12px; font-weight:500; letter-spacing:.18em; text-transform:uppercase; color:var(--warm-white); background:var(--ink); padding:12px 20px; text-decoration:none; transition:background .2s; cursor:pointer; }
        .pi-btn:hover{ background:var(--mid); }
        .pi-empty{ font-family:var(--sans); font-size:13px; font-weight:300; color:var(--grey); line-height:1.6; margin-top:6px; }

        .map-hint{ position:absolute; top:20px; left:24px; background:rgba(8,7,6,.82); color:var(--warm-white); padding:9px 16px; font-family:var(--sans); font-size:12px; font-weight:300; letter-spacing:.03em; z-index:15; display:flex; align-items:center; gap:9px; }
        .map-hint i{ opacity:.7; }

        /* Floor name badge — visible label of the level currently shown */
        .floor-badge{ position:absolute; top:20px; right:74px; z-index:21; display:flex; align-items:center; gap:9px; background:rgba(8,7,6,.9); color:var(--warm-white); padding:11px 18px; font-family:var(--sans); font-size:13px; font-weight:500; letter-spacing:.14em; text-transform:uppercase; box-shadow:0 4px 24px rgba(0,0,0,.12); pointer-events:none; max-width:calc(100% - 120px); }
        .floor-badge i{ opacity:.7; font-size:12px; }
        .floor-badge span{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

        /* tabs de piso: scroll horizontal si no caben */
        .floor-tabs{ flex-wrap:nowrap; overflow-x:auto; -webkit-overflow-scrolling:touch; }
        .floor-tabs::-webkit-scrollbar{ height:0; }
        .floor-tab{ flex:0 0 auto; white-space:nowrap; }
        @media(max-width:880px){
            *,*::before,*::after{ cursor:auto !important; }
            a,button,input,select{ cursor:pointer !important; }
            .map-wrapper{ flex-direction:column; margin-top:72px; height:auto; }
            nav#nav{ height:72px; }
            body{ overflow:auto; }
            .map-sidebar{ width:100%; border-right:none; border-bottom:1px solid var(--smoke); max-height:48vh; }
            .floor-tabs{ position:sticky; top:0; z-index:5; }
            .store-list{ max-height:none; }
            .map-canvas{ height:60vh; min-height:360px; }
            .floor-svg{ inset:10px; }
            nav.main-nav, .nav-links{ display:none; }
            .nav-ham{ display:flex; }
            .map-info{ left:8px; right:8px; bottom:8px; top:auto; width:auto; max-height:54vh; overflow-y:auto; }
            .pi-img{ height:120px; }
            .map-hint{ display:none; }
            .zoom-ctrl{ top:auto; bottom:78px; right:12px; }
            .floor-badge{ top:12px; right:12px; left:12px; justify-content:center; max-width:none; padding:12px 14px; font-size:13px; letter-spacing:.12em; }
        }
        @media(max-width:560px){
            .map-canvas{ height:54vh; min-height:300px; }
            .floor-tab{ font-size:10.5px; padding:12px 10px; letter-spacing:.1em; }
            .store-name{ font-size:15.5px; }
        }
    </style>
</head>

            document.getElementById('pi-action').innerHTML = '';
        }
        info.classList.add('show');
        // sync sidebar
        document.querySelectorAll('.store-item.active').forEach(i=>i.classList.remove('active'));
        const si = document.querySelector('.store-item[data-floor="'+floor+'"][data-local="'+local+'"]');
        if (si){ si.classList.add('active'); si.scrollIntoView({block:'nearest', behavior:'smooth'}); }
    }
    function clearSelection(){
        document.querySelectorAll('.store-zone.is-active').forEach(z=>z.classList.remove('is-active'));
        document.querySelectorAll('.store-item.active').forEach(i=>i.classList.remove('active'));
        info.classList.remove('show'); selectedZone=null;
    }
    document.getElementById('map-stage').addEventListener('click', e=>{ if(justDragged) return; if(e.target.id==='map-stage'||e.target.id==='map-pan'||e.target.tagName==='svg') clearSelection(); });

    // ---------- listado por PISO (estilo oficial: "local. NOMBRE") ----------
    function buildList(){
        const wrap = document.getElementById('store-list');
        const q = (document.getElementById('store-search').value||'').trim().toLowerCase();
        let html = '';
        // Todos los niveles, uno tras otro (sin tabs). Solo tiendas reales, alfabético por nombre.
        FLOOR_ORDER.forEach(floor => {
            const codes = [...new Set(FLOOR_META[floor].locals.map(String))];
            const items = codes
                .filter(c => storeFor(floor, c))
                .map(c => ({ code:c, st:storeFor(floor, c) }))
                .sort((a,b) => a.st.name.localeCompare(b.st.name,'es',{sensitivity:'base'}));
            let rows = '';
            items.forEach(({code, st}) => {
                const name = st.name;
                if (q && !(name.toLowerCase().includes(q) || (''+code).toLowerCase().includes(q))) return;
                rows += '<div class="store-item" data-floor="'+floor+'" data-local="'+code+'">'
                     + '<span class="store-num">'+code+'</span><div class="store-name">'+name+'</div></div>';
            });
            if (rows) html += '<div class="sl-group-label">'+FLOOR_LABELS[floor]+'</div>' + rows;
        });
        if (!html) html = '<div class="sl-group-label">Sin resultados</div>';
        wrap.innerHTML = html;
        wrap.querySelectorAll('.store-item').forEach(el => {
            const f=el.getAttribute('data-floor'), l=el.getAttribute('data-local');
            el.addEventListener('click', ()=>selectZone(f,l));
            el.addEventListener('mouseenter', ()=>{ const z=document.querySelector('#floor-'+f+' .store-zone[data-local="'+l+'"]'); if(z) z.classList.add('is-active'); });
            el.addEventListener('mouseleave', ()=>{ if(!selectedZone||selectedZone.local!=l){ const z=document.querySelector('#floor-'+f+' .store-zone[data-local="'+l+'"]'); if(z) z.classList.remove('is-active'); } });
        });
    }
    function onSearch(){ buildList(); }
    function applyCatTint(){
        document.querySelectorAll('.store-zone').forEach(z=>{ z.classList.remove('cat-on','cat-dim'); });
        if(!activeCat) return;
        document.querySelectorAll('.store-zone').forEach(z=>{
            if (z.getAttribute('data-cat')===activeCat) z.classList.add('cat-on'); else z.classList.add('cat-dim');
        });
    }

    // ---------- floor switching ----------
    function switchFloor(floor){
        activeFloor = floor;
        const badge = document.getElementById('floor-badge-label');
        if (badge) badge.textContent = FLOOR_META[floor].label;
        document.querySelectorAll('.floor-svg').forEach(d=>d.classList.toggle('active', d.getAttribute('data-floor')===floor));
        applyCatTint();
        resetView();
    }

    // ---------- pan & zoom ----------
    const stage = document.getElementById('map-stage');
    const pan = document.getElementById('map-pan');
    let scale=1, tx=0, ty=0, dragging=false, pending=false, sx=0, sy=0, downX=0, downY=0, capId=null, justDragged=false;
    function apply(){ pan.style.transform = 'translate('+tx+'px,'+ty+'px) scale('+scale+')'; }
    function resetView(){ scale=1; tx=0; ty=0; apply(); }
    function zoomAt(cx, cy, factor){
        const ns = Math.min(6, Math.max(0.6, scale*factor));
        const k = ns/scale;
        tx = cx - k*(cx - tx);
        ty = cy - k*(cy - ty);
        scale = ns; apply();
    }
    function zoomBy(f){ const r=stage.getBoundingClientRect(); zoomAt(r.width/2, r.height/2, f); }
    stage.addEventListener('wheel', e=>{ e.preventDefault(); const r=stage.getBoundingClientRect(); zoomAt(e.clientX-r.left, e.clientY-r.top, e.deltaY<0?1.12:1/1.12); }, {passive:false});
    // pointerdown only ARMS a potential drag; capture happens after the pointer actually
    // moves >5px, so a plain click still reaches the zone (no pointer-capture stealing it).
    stage.addEventListener('pointerdown', e=>{ pending=true; dragging=false; downX=e.clientX; downY=e.clientY; sx=e.clientX-tx; sy=e.clientY-ty; capId=e.pointerId; });
    stage.addEventListener('pointermove', e=>{
        if(!pending && !dragging) return;
        if(!dragging){
            if(Math.abs(e.clientX-downX)+Math.abs(e.clientY-downY) < 5) return;
            dragging=true; stage.classList.add('grabbing'); try{ stage.setPointerCapture(capId); }catch(_){}
        }
        tx=e.clientX-sx; ty=e.clientY-sy; apply();
    });
    function endDrag(){ pending=false; if(dragging){ dragging=false; justDragged=true; setTimeout(()=>justDragged=false,0); stage.classList.remove('grabbing'); try{ stage.releasePointerCapture(capId); }catch(_){} } }
    stage.addEventListener('pointerup', endDrag);
    stage.addEventListener('pointercancel', endDrag);

    // ---------- misc ----------
    function toggleMob(){ const m=document.getElementById('mob-nav'); m.classList.toggle('open'); document.body.style.overflow=m.classList.contains('open')?'hidden':''; const b=document.querySelector('.nav-ham'); if(b) b.setAttribute('aria-expanded', m.classList.contains('open')); }
    window.addEventListener('scroll', ()=>{ const n=document.getElementById('nav'); if(n) n.classList.toggle('s', window.scrollY>50); }, {passive:true});
    document.addEventListener('keydown', e=>{ if(e.key==='Escape') clearSelection(); });

    // custom cursor (desktop)
    const cur=document.getElementById('cursor'), dot=document.getElementById('cursor-dot');
    if (cur && window.matchMedia('(pointer:fine)').matches){
        document.addEventListener('mousemove', e=>{ cur.style.transform='translate('+e.clientX+'px,'+e.clientY+'px)'; if(dot) dot.style.transform='translate('+e.clientX+'px,'+e.clientY+'px)'; });
    }

    // deep link: ?floor=primer&local=33
    (function init(){
        buildList();
        resetView();
        const p = new URLSearchParams(location.search);
        const f = p.get('floor'), l = p.get('local');
        if (f && FLOOR_META[f]){ switchFloor(f); if(l) setTimeout(()=>selectZone(f, +l), 60); }
    })();
    </script>
